name: CI Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: corepack enable
      # Install first: under Yarn PnP a script cannot run before the project is
      # installed, and the Yarn cache is not committed (no zero-install).
      - run: yarn install --immutable
      - run: yarn cichecks
